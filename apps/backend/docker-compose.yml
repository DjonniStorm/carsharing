services:
  postgres:
    image: postgres:16-alpine
    container_name: carsharing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carsharing
      POSTGRES_PASSWORD: carsharing
      POSTGRES_DB: carsharing
    ports:
      - '5432:5432'
    volumes:
      - carsharing_pg_data:/var/lib/postgresql/data

volumes:
  carsharing_pg_data:
