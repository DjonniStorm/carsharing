services:
  postgres:
    # PostGIS required for `geo_zone.polygon` as geometry(Polygon,4326)
    image: postgis/postgis:16-3.4-alpine
    container_name: carsharing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carsharing
      POSTGRES_PASSWORD: carsharing
      POSTGRES_DB: carsharing
    ports:
      - '5432:5432'
    volumes:
      - carsharing_pg_data:/var/lib/postgresql/data

volumes:
  carsharing_pg_data:
